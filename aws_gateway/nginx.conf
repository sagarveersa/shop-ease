worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 20m;

    upstream frontend_upstream {
        server 3.109.208.166:80;
    }

    upstream django_upstream {
	server 65.0.170.227:80;
    }


    server {
        listen 443 ssl;
        server_name shop-ease.duckdns.org www.shop-ease.duckdns.org; 

	ssl_certificate /etc/letsencrypt/live/shop-ease.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/shop-ease.duckdns.org/privkey.pem;

        location = /healthz {
            add_header Content-Type text/plain;
            return 201 "ok";
        }

	location / {
	    proxy_pass http://frontend_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
	}

	location /api/ {
            proxy_pass http://django_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /admin/ {
            proxy_pass http://django_upstream;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

}