services:
  db:
    image: postgres:16-alpine
    container_name: shop_ease_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: shop_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shop_db"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    container_name: shop_ease_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12

  django:
    build:
      context: ./backend/main
      dockerfile: Dockerfile
    container_name: shop_ease_django
    restart: unless-stopped
    env_file:
      - ./backend/main/.env
    environment:
      DEBUG: "0"
      DB_HOST: db
      DB_PORT: "5432"
      DB_POST: "5432"
      DB_NAME: shop_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      WAIT_FOR_DB: "true"
      WAIT_FOR_REDIS: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_data:/app/static

  worker:
    build:
      context: ./backend/main
      dockerfile: Dockerfile
    container_name: shop_ease_worker
    restart: unless-stopped
    env_file:
      - ./backend/main/.env
    environment:
      DEBUG: "0"
      DB_HOST: db
      DB_PORT: "5432"
      DB_POST: "5432"
      DB_NAME: shop_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      WAIT_FOR_DB: "true"
      WAIT_FOR_REDIS: "true"
    command: >
      sh -c "python scripts/wait_for_services.py &&
             celery -A core worker --loglevel=info"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  chat:
    build:
      context: ./backend/chat
      dockerfile: Dockerfile
    container_name: shop_ease_chat
    restart: unless-stopped
    env_file:
      - ./backend/chat/.env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: shop_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      WAIT_FOR_DB: "true"
      WAIT_FOR_REDIS: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:80/api/}
        VITE_CHAT_API_URL: ${VITE_CHAT_API_URL:-ws://localhost:80/api/ws/}
        VITE_MIXPANEL_PROJECT_TOKEN: ${VITE_MIXPANEL_PROJECT_TOKEN:-}
        VITE_AUTH0_AUDIENCE: ${VITE_AUTH0_AUDIENCE:-}
        VITE_AUTH0_DOMAIN: ${VITE_AUTH0_DOMAIN:-}
        VITE_AUTH0_CLIENT_ID: ${VITE_AUTH0_CLIENT_ID:-}
    container_name: shop_ease_frontend
    restart: unless-stopped
    depends_on:
      - django
      - chat

  gateway:
    image: nginx:latest
    container_name: shop_ease_gateway
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - django
      - frontend
      - chat
    volumes:
      - static_data:/app/static
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:
  static_data:
